<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yakında Açılıyor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Yakında Açılıyor</h1>
        <p>Heyecan verici bir şeyler üzerinde çalışıyoruz! Bizi takipte kalın.</p>
        <div class="timer">
            <div><span id="days">00</span><p>Gün</p></div>
            <div><span id="hours">00</span><p>Saat</p></div>
            <div><span id="minutes">00</span><p>Dakika</p></div>
            <div><span id="seconds">00</span><p>Saniye</p></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
